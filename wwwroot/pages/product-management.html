<section id="pm-section" class="pm-section">
    <div class="pm-wrap">

        <!-- Header -->
        <div class="pm-header animate-up">
            <div>
                <h2 class="pm-title">Gestão de Produtos</h2>
                <p class="pm-sub">Insira, edite e remova itens do cardápio</p>
            </div>
            <div class="d-flex gap-2">
                <button class="pm-btn-ghost" onclick="showSection('dashboard')">← Dashboard</button>
                <button class="pm-btn-primary" onclick="openProductForm()">+ Novo Produto</button>
            </div>
        </div>

        <!-- Form Panel (hidden by default) -->
        <div id="pm-form-panel" class="pm-panel d-none animate-up">
            <div class="pm-panel-head">
                <h5 class="pm-panel-title" id="pm-form-title">Novo Produto</h5>
                <button class="pm-close-btn" onclick="closeProductForm()" title="Fechar">✕</button>
            </div>
            <form id="pm-form" onsubmit="submitProductForm(event)">
                <input type="hidden" id="pm-product-id" value="">

                <div class="pm-field">
                    <label class="pm-label" for="pm-name">Nome do Produto</label>
                    <input type="text" id="pm-name" class="pm-input" placeholder="Ex.: Hambúrguer Duplo" required maxlength="100">
                </div>

                <div class="pm-field">
                    <label class="pm-label" for="pm-description">Descrição</label>
                    <textarea id="pm-description" class="pm-input pm-textarea" placeholder="Ingredientes, detalhes..." required maxlength="100" rows="2"></textarea>
                </div>

                <div class="pm-field">
                    <label class="pm-label" for="pm-price">Preço (R$)</label>
                    <input type="number" id="pm-price" class="pm-input" placeholder="0,00" step="0.01" min="0" required>
                </div>

                <div class="pm-form-actions">
                    <button type="button" class="pm-btn-ghost" onclick="closeProductForm()">Cancelar</button>
                    <button type="submit" class="pm-btn-primary" id="pm-submit-btn">Salvar Produto</button>
                </div>
            </form>
        </div>

        <!-- Products Table -->
        <div class="pm-table-wrap animate-up" style="animation-delay:.1s">
            <div class="pm-table-header">
                <span class="pm-count" id="pm-count">Carregando...</span>
                <button class="pm-refresh" onclick="loadProductsAdmin()">↺ Atualizar</button>
            </div>

            <div id="pm-table-body">
                <!-- dynamic -->
            </div>

            <!-- Empty state -->
            <div id="pm-empty" class="pm-empty d-none">
                <p>Nenhum produto cadastrado ainda.</p>
                <button class="pm-btn-primary" onclick="openProductForm()">+ Criar primeiro produto</button>
            </div>
        </div>

        <!-- Delete confirmation -->
        <div id="pm-delete-confirm" class="pm-delete-overlay d-none">
            <div class="pm-delete-box">
                <p class="pm-delete-msg">Remover <strong id="pm-delete-name"></strong>?</p>
                <p class="pm-delete-sub">Esta ação não pode ser desfeita.</p>
                <div class="pm-form-actions">
                    <button class="pm-btn-ghost" onclick="cancelDelete()">Cancelar</button>
                    <button class="pm-btn-danger" id="pm-confirm-delete-btn">Remover</button>
                </div>
            </div>
        </div>

    </div>
</section>
