<div class="container-fluid py-4">
    <div class="row g-4 mb-4">
        <!-- KPI Cards -->
        <div class="col-md-3">
            <div class="card border-0 shadow-sm p-3">

                    <div class="icon-shape bg-light-primary text-primary rounded-3 p-3 me-3">

                    </div>
                    <div>
                        <h6 class="text-muted mb-1">Vendas Hoje</h6>

                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 shadow-sm p-3">
                <div class="d-flex align-items-center">
                    <div class="icon-shape bg-light-success text-success rounded-3 p-3 me-3">
                        <i class="fas fa-shopping-bag fa-lg"></i>
                    </div>
                    <div>
                        <h6 class="text-muted mb-1">Pedidos Ativos</h6>
                        <h4 class="fw-bold mb-0">12</h4>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 shadow-sm p-3">
                <div class="d-flex align-items-center">
                    <div class="icon-shape bg-light-info text-info rounded-3 p-3 me-3">
                        <i class="fas fa-users fa-lg"></i>
                    </div>
                    <div>
                        <h6 class="text-muted mb-1">Novos Clientes</h6>
                        <h4 class="fw-bold mb-0">5</h4>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 shadow-sm p-3">
                <div class="d-flex align-items-center">
                    <div class="icon-shape bg-light-warning text-warning rounded-3 p-3 me-3">
                        <i class="fas fa-clock fa-lg"></i>
                    </div>
                    <div>
                        <h6 class="text-muted mb-1">Tempo Médio</h6>
                        <h4 class="fw-bold mb-0">22 min</h4>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <!-- Recent Orders Table -->
        <div class="col-lg-8">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-header bg-white border-0 py-3 d-flex justify-content-between align-items-center">
                    <h5 class="fw-bold m-0">Gestão de Pedidos</h5>
                    <button class="btn btn-sm btn-outline-primary" onclick="adminLoadOrders()">Atualizar</button>
                </div>
                <div class="table-responsive p-3">
                    <table class="table table-hover align-middle border-top">
                        <thead class="bg-light">
                            <tr>
                                <th class="border-0 small text-muted">ID</th>
                                <th class="border-0 small text-muted">CLIENTE</th>
                                <th class="border-0 small text-muted">STATUS</th>
                                <th class="border-0 small text-muted">VALOR</th>
                                <th class="border-0 small text-muted">AÇÕES</th>
                            </tr>
                        </thead>
                        <tbody id="admin-orders-table">
                            <!-- Dados Mockados -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Best Sellers -->
        <div class="col-lg-4">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-header bg-white border-0 py-3">
                    <h5 class="fw-bold m-0">Mais Vendidos</h5>
                </div>
                <div class="card-body p-3" id="admin-best-sellers">

                </div>
